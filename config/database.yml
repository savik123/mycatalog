default: &default
  adapter: postgresql
  encoding: unicode
  username: postgres
  password: 123456
  host: localhost
  port: 5432
  pool: 5

development:
  <<: *default
  database: equipment_catalog_development

test:
  <<: *default
  database: equipment_catalog_test
#
production:
  url: <%= ENV["DATABASE_URL"] %>
  primary: &primary_production
    <<: *default
    database: equipment_catalog_production
    username: equipment_catalog
    password: <%= ENV["EQUIPMENT_CATALOG_DATABASE_PASSWORD"] %>
  cache:
    <<: *primary_production
    database: equipment_catalog_production_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *primary_production
    database: equipment_catalog_production_queue
    migrations_paths: db/queue_migrate
  cable:
    <<: *primary_production
    database: equipment_catalog_production_cable
    migrations_paths: db/cable_migrate
